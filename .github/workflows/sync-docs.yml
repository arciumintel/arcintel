name: Sync docs to arcademy-docs

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - "docs/**"

permissions:
  contents: read

jobs:
  sync-docs:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      TARGET_REPO: arcademy-docs
      TARGET_BRANCH: main
      TARGET_PATH: docs

    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare docs export
        run: |
          rm -rf /tmp/docs-export
          mkdir -p /tmp/docs-export
          cp -R docs/. /tmp/docs-export/

      - name: Checkout target docs repo
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/${{ env.TARGET_REPO }}
          token: ${{ secrets.DOCS_REPO_PAT }}
          ref: ${{ env.TARGET_BRANCH }}
          path: target-repo

      - name: Sync docs into target path
        run: |
          set -e
          cd target-repo

          mkdir -p "${{ env.TARGET_PATH }}"
          rm -rf "${{ env.TARGET_PATH }}"/*
          cp -R /tmp/docs-export/. "${{ env.TARGET_PATH }}/"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -A "${{ env.TARGET_PATH }}"

          if git diff --cached --quiet; then
            echo "No docs changes to sync."
            exit 0
          fi

          git commit -m "Sync docs from arcademy (${GITHUB_SHA}) [skip ci]"
          git push origin "${{ env.TARGET_BRANCH }}"
